<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini TFT Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="status-bar" style="display: flex; justify-content: space-around; background: #141622; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold;">
            <div>⚔️ Vòng: <span id="round">1</span></div>
            <div>💰 Vàng: <span id="gold">50</span></div>
            <div>📦 Điểm Hũ: <span id="cashout-points" style="color: #ff9800;">0</span></div>
        </div>

        <h1>Mini TFT Clone</h1>
        
        <div style="display: flex; justify-content: center; gap: 20px;">
            <div id="traits-panel"></div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div id="battlefield"></div>
                
                <div id="champ-info-panel" style="background: #141622; padding: 10px; border-radius: 8px; border: 1px solid #3b3e54; min-height: 50px; text-align: center; color: #aaa; font-size: 13px;">
                    💡 Click vào một tướng để xem chỉ số. Nhấp đúp (Double click) để di chuyển lên/xuống sàn!
                </div>
            </div>
        </div>

        <div id="bench"></div>

        <div id="control-panel">
            <div id="shop"></div>
            <div style="display: flex; justify-content: center; gap: 10px; margin-top: 15px;">
                <button id="reroll-btn">Đổi lại (2 Vàng)</button>
                <button id="win-btn" style="padding: 10px 20px; background-color: #4caf50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Giả lập THẮNG TRẬN</button>
                <button id="lose-btn" style="padding: 10px 20px; background-color: #f44336; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Giả lập THUA TRẬN</button>
                <button id="cashout-btn" style="padding: 10px 20px; background-color: #ff9800; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">💥 NỔ HŨ 💥</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="board.js"></script>
    <script src="shop.js"></script>
    <script src="game.js"></script>
</body>
</html>
